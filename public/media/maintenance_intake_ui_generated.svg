  <text x="350" y="251" fill="#31456A" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0.16em">TENANT SUPPORT</text>

  <text x="205" y="390" fill="#101828" font-family="Arial, sans-serif" font-size="78" font-weight="800">Maintenance</text>
  <text x="205" y="472" fill="#101828" font-family="Arial, sans-serif" font-size="78" font-weight="800">Intake Agent</text>
  <text x="205" y="560" fill="#4338CA" font-family="Arial, sans-serif" font-size="34" font-weight="700">
    Collect the issue. Check urgency. Route the next step.
  </text>

  <text x="205" y="640" fill="#556070" font-family="Arial, sans-serif" font-size="28">
    The AI agent gathers the problem in detail, logs every case
  </text>
  <text x="205" y="684" fill="#556070" font-family="Arial, sans-serif" font-size="28">
    to CRM, sends updates, and pushes urgent issues straight to
  </text>
  <text x="205" y="728" fill="#556070" font-family="Arial, sans-serif" font-size="28">
    your maintenance team without messy manual triage.
  </text>

  <rect x="205" y="804" width="272" height="120" rx="28" fill="#0F172A"/>
  <text x="255" y="872" fill="white" font-family="Arial, sans-serif" font-size="34" font-weight="700">CRM Logged</text>
  <circle cx="410" cy="865" r="20" fill="#1E293B"/>
  <path d="M400 865H420" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M410 855V875" stroke="white" stroke-width="4" stroke-linecap="round"/>

