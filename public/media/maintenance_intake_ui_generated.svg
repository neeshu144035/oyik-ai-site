  <text x="878" y="766" fill="#0F172A" font-family="Arial, sans-serif" font-size="24">Tenant details saved</text>
  <text x="878" y="801" fill="#0F172A" font-family="Arial, sans-serif" font-size="24">Property tagged</text>

  <rect x="1118" y="676" width="262" height="144" rx="28" fill="white" fill-opacity="0.9" stroke="#DDE5F8"/>
  <text x="1158" y="722" fill="#4338CA" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="0.18em">EMAIL SENT</text>
  <text x="1158" y="766" fill="#0F172A" font-family="Arial, sans-serif" font-size="24">Case confirmation</text>
  <text x="1158" y="801" fill="#0F172A" font-family="Arial, sans-serif" font-size="24">Booking details attached</text>

  <rect x="838" y="854" width="542" height="134" rx="28" fill="#F8FAFC" stroke="#DDE5F8"/>
  <text x="878" y="900" fill="#667085" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="0.18em">NON-URGENT FLOW</text>
  <text x="878" y="944" fill="#0F172A" font-family="Arial, sans-serif" font-size="24">
    Send SMS or email form link so the tenant can add more details
  </text>
  <text x="878" y="978" fill="#0F172A" font-family="Arial, sans-serif" font-size="24">
    and upload issue photos before the case is assigned.
  </text>

