  <rect x="840" y="210" width="210" height="48" rx="24" fill="#F3F6FF" stroke="#DCE4F8"/>
  <text x="875" y="241" fill="#53627E" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="0.18em">ISSUE INTAKE</text>

  <rect x="840" y="294" width="540" height="104" rx="26" fill="#F8FAFC" stroke="#E4E7EC"/>
